<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>VOCAB — 英語トレーニング</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VOCAB">
<meta name="theme-color" content="#0c0d10">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d10;--panel:#15171c;--panel-2:#1c1f26;--line:#2a2e38;
    --ink:#f2f3f5;--sub:#8a909c;--gold:#c9a86a;--green:#3ddc84;--red:#ff5e57;--blue:#5aa9ff;
    --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
    --tabbar-h:56px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html{height:100%;}
  body{
    font-family:'Noto Sans JP',-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100%;
    overscroll-behavior-y:none;-webkit-user-select:none;user-select:none;
    -webkit-text-size-adjust:100%;
  }
  input,textarea{-webkit-user-select:text;user-select:text;}
  #screen{
    max-width:520px;margin:0 auto;
    padding:calc(var(--sat) + 14px) 20px calc(var(--tabbar-h) + var(--sab) + 28px);
    min-height:100vh;
  }
  /* ---- large title ---- */
  .lt-eyebrow{font-family:'Archivo';font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
  .lt{font-size:28px;font-weight:700;letter-spacing:.3px;margin-bottom:4px;}
  .lt-sub{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:20px;}

  /* ---- tab bar ---- */
  #tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(18,20,25,.92);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:6px 8px calc(6px + var(--sab));
  }
  .tab{flex:1;max-width:90px;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--sub);cursor:pointer;padding:5px 0;border-radius:12px;
    font-family:'Noto Sans JP';transition:color .15s;}
  .tab svg{width:23px;height:23px;}
  .tab span{font-size:10px;font-weight:500;letter-spacing:.5px;}
  .tab.active{color:var(--gold);}

  /* ---- cards / rows ---- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;}
  .card.hl{border-color:var(--gold);background:linear-gradient(180deg,#1d1c18,#15171c);}
  .card h3{font-size:16px;font-weight:700;margin-bottom:6px;}
  .card p{font-size:12.5px;color:var(--sub);line-height:1.65;}
  .card .ic{font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;text-transform:uppercase;}

  .list{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;
    color:var(--ink);font-family:'Noto Sans JP';transition:border-color .15s,transform .08s;}
  .row:active{transform:scale(.985);}
  .row.accent{border-color:var(--gold);background:linear-gradient(180deg,#1d1c18,#15171c);}
  .row-main{flex:1;min-width:0;}
  .row-title{font-size:15px;font-weight:700;}
  .row-sub{font-size:11.5px;color:var(--sub);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row-arrow{color:var(--sub);font-size:17px;flex:none;}
  .row.disabled{opacity:.38;pointer-events:none;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .set-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;
    cursor:pointer;transition:transform .08s;}
  .set-card:active{transform:scale(.97);}
  .set-card h4{font-size:13.5px;font-weight:700;margin-bottom:5px;line-height:1.4;}
  .set-card .cnt{font-size:11px;color:var(--sub);}
  .set-card .cat{font-size:10px;color:var(--gold);letter-spacing:1px;margin-top:6px;text-transform:uppercase;font-family:'Archivo';}
  .set-card{position:relative;}
  .set-card.sel{border-color:var(--gold);background:linear-gradient(180deg,#1d1c18,#15171c);}
  .set-card .chk{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:6px;
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
  .set-card.sel .chk{background:var(--gold);border-color:var(--gold);color:#0c0d10;}
  .count-chips{display:flex;gap:9px;margin-top:4px;}
  .count-chip{flex:1;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 6px;font-size:14px;font-weight:700;font-family:'Archivo';cursor:pointer;color:var(--sub);transition:.12s;}
  .count-chip.on{border-color:var(--gold);color:var(--gold);background:linear-gradient(180deg,#1d1c18,#15171c);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .filter-chip{background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:9px 15px;
    font-size:13px;font-weight:600;font-family:'Noto Sans JP';color:var(--sub);cursor:pointer;transition:.12s;}
  .filter-chip.on{border-color:var(--gold);color:var(--gold);background:linear-gradient(180deg,#1d1c18,#15171c);}

  .divider{display:flex;align-items:center;gap:13px;margin:22px 0 14px;}
  .divider span{font-family:'Archivo';font-size:10.5px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;white-space:nowrap;}
  .divider:before,.divider:after{content:"";height:1px;background:var(--line);flex:1;}

  .btn{width:100%;border:none;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:13px;
    letter-spacing:2px;text-transform:uppercase;padding:15px;border-radius:14px;transition:.15s;}
  .btn:active{transform:scale(.985);}
  .btn.primary{background:var(--gold);color:#0c0d10;}
  .btn.danger{background:var(--red);color:#fff;}
  .btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--line);}
  .btn+.btn{margin-top:10px;}

  .navbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back{background:none;border:1px solid var(--line);color:var(--sub);border-radius:10px;
    padding:8px 13px;font-size:12.5px;cursor:pointer;font-family:'Noto Sans JP';}
  .nav-title{font-size:12px;color:var(--sub);letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .nav-title b{color:var(--ink);}

  /* ---- mastery ---- */
  .lvl-badge{display:inline-flex;align-items:center;justify-content:center;font-family:'Archivo';
    font-weight:800;font-size:10px;letter-spacing:.5px;border-radius:7px;padding:3px 8px;flex:none;}
  .lvl-0{background:#23262e;color:var(--sub);}
  .lvl-1{background:rgba(90,169,255,.14);color:var(--blue);}
  .lvl-2{background:rgba(201,168,106,.15);color:var(--gold);}
  .lvl-3{background:rgba(61,220,132,.14);color:var(--green);}
  .st-new{background:#23262e;color:var(--sub);}
  .st-review{background:rgba(255,94,87,.15);color:var(--red);}
  .mbar{display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--panel-2);margin:12px 0 8px;}
  .mbar>div{height:100%;}
  .mlegend{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:11px;color:var(--sub);}
  .mlegend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}

  .stat-row{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px;}
  .stat-row .s{flex:1;padding:14px 6px;text-align:center;}
  .stat-row .s+.s{border-left:1px solid var(--line);}
  .stat-row .n{font-family:'Archivo';font-size:21px;font-weight:800;}
  .stat-row .l{font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

  /* ---- quiz ---- */
  .track{height:4px;background:var(--panel-2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
  .track>div{height:100%;background:linear-gradient(90deg,#b8924f,var(--gold));transition:width .35s;}
  .qmeta{display:flex;justify-content:space-between;font-family:'Archivo';font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:20px;}
  .qtag{font-family:'Archivo';font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;text-align:center;}
  .qword-wrap{text-align:center;padding:8px 0 4px;animation:rise .35s cubic-bezier(.2,.8,.3,1);}
  .qword-row{display:flex;align-items:center;justify-content:center;gap:12px;
    padding:10px 0 2px;animation:rise .35s cubic-bezier(.2,.8,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .qword{font-family:'Archivo';font-weight:700;font-size:clamp(24px,7.5vw,38px);letter-spacing:.5px;line-height:1.2;word-break:break-word;}
  .qsentence{font-size:clamp(16px,4.6vw,20px);font-weight:500;line-height:1.85;}
  .qprompt-jp{font-size:13.5px;color:var(--sub);margin-top:11px;}
  .cloze-gap{display:inline-block;min-width:62px;border-bottom:2px solid var(--gold);color:transparent;margin:0 4px;}
  .mode-pill{font-size:10px;color:var(--gold);letter-spacing:1px;font-family:'Archivo';
    border:1px solid var(--line);border-radius:7px;padding:3px 8px;white-space:nowrap;}
  .audio-toggle{background:none;border:1px solid var(--line);color:var(--sub);border-radius:9px;
    padding:6px 10px;font-size:12px;cursor:pointer;}
  .audio-toggle.on{color:var(--gold);border-color:var(--gold);}

  .speak-ic{flex:none;width:40px;height:40px;border-radius:50%;background:var(--panel);
    border:1px solid var(--line);color:var(--sub);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:.12s;}
  .speak-ic:active{transform:scale(.92);}
  .speak-ic.playing{border-color:var(--gold);color:var(--gold);}
  .speak-ic svg{width:18px;height:18px;}
  .speak-ic.playing .wave{animation:pulse .7s ease-in-out infinite;}
  .speak{margin:14px auto 0;display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);color:var(--sub);border-radius:99px;padding:8px 17px;font-size:12px;
    font-family:'Archivo';font-weight:700;letter-spacing:1px;cursor:pointer;}
  .speak.playing{border-color:var(--gold);color:var(--gold);}
  .speak svg{width:15px;height:15px;}
  .speak.playing .wave{animation:pulse .7s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

  .gate{margin-top:18px;display:flex;flex-direction:column;gap:11px;}
  .gate-hint{text-align:center;font-size:12.5px;color:var(--sub);margin-bottom:4px;line-height:1.6;}
  .gate-btn{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:14px;padding:17px;font-size:15.5px;font-weight:700;font-family:'Noto Sans JP';
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.12s;}
  .gate-btn:active{transform:scale(.985);}
  .gate-btn.know{border-color:var(--green);color:var(--green);}
  .gate-btn.unknown{border-color:var(--sub);color:var(--sub);}
  .gate-btn .sub{font-size:11px;font-weight:400;opacity:.8;}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:22px;}  .opt{display:flex;align-items:center;gap:13px;text-align:left;width:100%;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:15px;color:var(--ink);font-size:15px;
    font-weight:500;font-family:'Noto Sans JP';cursor:pointer;transition:.12s;}
  .opt:active:not(:disabled){transform:scale(.985);}
  .opt .k{font-family:'Archivo';font-weight:700;font-size:11.5px;width:23px;height:23px;flex:none;
    display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:7px;color:var(--sub);}
  .opt.correct{background:rgba(61,220,132,.1);border-color:var(--green);}
  .opt.correct .k{border-color:var(--green);color:var(--green);}
  .opt.wrong{background:rgba(255,94,87,.1);border-color:var(--red);}
  .opt.wrong .k{border-color:var(--red);color:var(--red);}
  .opt.dim{opacity:.4;}
  .opt:disabled{cursor:default;}
  .recant{margin-top:4px;width:100%;background:none;border:1px dashed var(--line);color:var(--sub);
    border-radius:12px;padding:11px;font-size:12.5px;font-family:'Noto Sans JP';cursor:pointer;}
  .recant:active{transform:scale(.99);}

  .spell-wrap{margin-top:22px;}
  .spell-input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:15px;color:var(--ink);font-size:19px;font-family:'Archivo';font-weight:600;
    letter-spacing:1px;text-align:center;outline:none;}
  .spell-input:focus{border-color:var(--gold);}
  .spell-input.correct{border-color:var(--green);color:var(--green);}
  .spell-input.wrong{border-color:var(--red);color:var(--red);}
  .spell-submit{margin-top:12px;width:100%;border:none;cursor:pointer;font-family:'Archivo';font-weight:700;
    font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#0c0d10;padding:14px;border-radius:14px;background:var(--gold);}
  .spell-submit:disabled{opacity:.4;}
  .spell-help{margin-top:10px;width:100%;background:none;border:1px solid var(--line);color:var(--sub);
    border-radius:14px;padding:12px;font-size:12.5px;font-family:'Noto Sans JP';cursor:pointer;}

  .order-answer{min-height:52px;border:1px dashed var(--line);border-radius:14px;padding:11px;
    display:flex;flex-wrap:wrap;gap:8px;margin-top:22px;background:var(--panel-2);}
  .order-answer:empty:before{content:"ここに単語を並べます";color:var(--sub);font-size:13px;}
  .order-bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px;
    font-size:15px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP';}
  .chip.used{opacity:.25;pointer-events:none;}
  .chip.in-answer{border-color:var(--gold);}
  .order-check{margin-top:16px;width:100%;border:none;cursor:pointer;font-family:'Archivo';font-weight:700;
    font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#0c0d10;padding:14px;border-radius:14px;background:var(--gold);}
  .order-check:disabled{opacity:.4;}

  .fb{min-height:18px;text-align:center;margin-top:16px;font-size:13px;font-weight:600;opacity:0;transition:.2s;line-height:1.6;}
  .fb.show{opacity:1;}
  .fb.ok{color:var(--green);}
  .fb.no{color:var(--red);}
  .fb .note{display:block;color:var(--sub);font-size:12px;font-weight:400;margin-top:3px;}
  .next{position:fixed;left:50%;transform:translateX(-50%) translateY(8px);
    bottom:calc(var(--tabbar-h) + var(--sab) + 14px);z-index:40;
    width:min(calc(100% - 40px),480px);border:none;cursor:pointer;font-family:'Archivo';font-weight:700;
    font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#0c0d10;padding:17px;border-radius:14px;
    background:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}
  .next.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  /* give quiz content room so fixed NEXT never overlaps the last option */
  .quiz-pad{padding-bottom:78px;}
  .timer-bar{height:5px;background:var(--panel-2);border-radius:99px;overflow:hidden;margin:-8px 0 18px;}
  .timer-bar>div{height:100%;width:100%;background:var(--green);transition:width .1s linear;}
  .timer-bar>div.warn{background:var(--gold);}
  .timer-bar>div.danger{background:var(--red);}

  /* ---- result ---- */
  .result{text-align:center;animation:rise .4s;padding-top:8px;}
  .ring{width:150px;height:150px;margin:8px auto 18px;position:relative;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .pct b{font-family:'Archivo';font-size:38px;font-weight:800;}
  .ring .pct small{font-size:10px;color:var(--sub);letter-spacing:2px;margin-top:3px;}
  .res-msg{font-family:'Archivo';font-size:17px;font-weight:800;letter-spacing:2px;margin-bottom:5px;}
  .res-sub{font-size:13px;color:var(--sub);margin-bottom:22px;line-height:1.6;}
  .retry-note{font-size:12px;color:var(--gold);margin-bottom:12px;}

  /* ---- forms / editor ---- */
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:6px;font-family:'Archivo';text-transform:uppercase;}
  .field input,.field select,.field textarea{width:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 13px;color:var(--ink);font-size:15px;font-family:'Noto Sans JP';outline:none;}
  .field input:focus,.field textarea:focus{border-color:var(--gold);}
  .field input[type=date]{-webkit-appearance:none;min-height:46px;}
  .search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;color:var(--ink);font-size:15px;font-family:'Noto Sans JP';outline:none;margin-bottom:13px;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;}
  .toggle-row .t-main{flex:1;}
  .toggle-row .t-title{font-size:14.5px;font-weight:700;}
  .toggle-row .t-sub{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .switch{width:50px;height:30px;border-radius:99px;background:#2a2e38;border:none;position:relative;cursor:pointer;transition:.2s;flex:none;}
  .switch:after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#8a909c;transition:.2s;}
  .switch.on{background:var(--gold);}
  .switch.on:after{left:23px;background:#0c0d10;}

  .toast{position:fixed;left:50%;bottom:calc(var(--tabbar-h) + var(--sab) + 18px);transform:translateX(-50%) translateY(8px);
    background:#23262e;border:1px solid var(--line);color:var(--ink);font-size:13px;padding:11px 20px;
    border-radius:99px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%);}
  .empty{color:var(--sub);font-size:13px;text-align:center;padding:28px 0;line-height:1.7;}
  /* ---- flashcard ---- */
  .flash-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;
    min-height:300px;display:flex;flex-direction:column;align-items:stretch;justify-content:stretch;
    padding:0;text-align:center;animation:rise .3s;position:relative;overflow:hidden;}
  .fc-half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;padding:26px 22px;cursor:pointer;min-height:140px;transition:background .12s;}
  .fc-half:active{background:rgba(255,255,255,.03);}
  .fc-line{height:1px;background:var(--line);margin:0 18px;}
  .flash-card .fc-en{font-family:'Archivo';font-weight:700;font-size:clamp(24px,7.5vw,38px);letter-spacing:.5px;word-break:break-word;line-height:1.2;}
  .flash-card .fc-ja{font-size:clamp(17px,5vw,22px);font-weight:500;line-height:1.7;color:var(--gold);}
  .flash-card .fc-ex{font-size:13px;color:var(--sub);line-height:1.7;margin-top:2px;}
  .fc-tap{font-size:12px;color:var(--sub);letter-spacing:1px;font-family:'Archivo';opacity:.7;
    border:1px dashed var(--line);border-radius:10px;padding:10px 16px;}
  .flash-card .fc-mark{position:absolute;top:12px;right:14px;font-size:11px;font-family:'Archivo';font-weight:800;letter-spacing:1px;z-index:2;}
  .fc-mark.known{color:var(--green);}
  .fc-mark.later{color:var(--gold);}
  .flash-speak{position:absolute;top:10px;left:12px;width:38px;height:38px;border-radius:50%;z-index:2;
    background:var(--panel-2);border:1px solid var(--line);color:var(--sub);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .flash-speak svg{width:17px;height:17px;}
  .flash-actions{display:flex;gap:11px;margin-top:16px;}
  .flash-actions button{flex:1;border:none;cursor:pointer;font-family:'Noto Sans JP';font-weight:700;

/* ---------- tiny IndexedDB wrapper ---------- */
const DB={
  db:null,
  open(){return new Promise((res,rej)=>{
    const r=indexedDB.open("vocab-app",1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains("kv"))d.createObjectStore("kv");
      if(!d.objectStoreNames.contains("progress"))d.createObjectStore("progress");
    };
    r.onsuccess=e=>{DB.db=e.target.result;res();};
    r.onerror=()=>rej(r.error);
  });},
  _tx(store,mode){return DB.db.transaction(store,mode).objectStore(store);},
  get(store,key){return new Promise((res,rej)=>{const q=DB._tx(store,"readonly").get(key);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});},
  put(store,key,val){return new Promise((res,rej)=>{const q=DB._tx(store,"readwrite").put(val,key);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  del(store,key){return new Promise((res,rej)=>{const q=DB._tx(store,"readwrite").delete(key);q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  clear(store){return new Promise((res,rej)=>{const q=DB._tx(store,"readwrite").clear();q.onsuccess=()=>res();q.onerror=()=>rej(q.error);});},
  entries(store){return new Promise((res,rej)=>{
    const out=[];const q=DB._tx(store,"readonly").openCursor();
    q.onsuccess=e=>{const c=e.target.result;if(c){out.push([c.key,c.value]);c.continue();}else res(out);};
    q.onerror=()=>rej(q.error);
  });}
};

// rebuild QUESTIONS from LIBRARY + MYWORDS and persist library
async function syncLibrary(){
  rebuildQuestions();

}
function rebuildQuestions(){
  // マイ単語帳の各単語に教材名・セクションを補完（学習の仕組みに合流させる）
  MYWORDS.forEach(w=>{w.book=MYBOOK;if(!w.section)w.section="登録した単語";if(!w.type)w.type="word";if(!w.category)w.category="マイ単語";});
  QUESTIONS=[...LIBRARY.flatMap(b=>b.items),...MYWORDS];
}
async function saveMyWords(){

}
// merge an imported file into the library by name (replace if same name)
async function addBookToLibrary(name,items){
  const i=LIBRARY.findIndex(b=>b.name===name);
  if(i>=0)LIBRARY[i]={name,items};
  else LIBRARY.push({name,items});
  await syncLibrary();
}

function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),2200);}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function uniq(a){return [...new Set(a)];}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* ---------- CSV parsing (quoted fields ok) ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{
      if(c==='"')q=true;
      else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function rowsToItems(rows){
  if(!rows.length)return [];
  const head=rows.shift().map(h=>String(h??"").trim().toLowerCase());
  const idx=n=>head.indexOf(n);
  const out=[];
  for(const r of rows){
    const get=n=>{const i=idx(n);return i>=0&&r[i]!=null?String(r[i]).trim():"";};
    const q=get("question"),a=get("answer");
    if(!q||!a)continue;
    out.push({
      book:get("book")||"未分類",section:get("section")||"その他",
      type:(get("type")||"word").toLowerCase(),category:get("category")||"その他",
      question:q,answer:a,
      choices:[get("choice1"),get("choice2"),get("choice3")].filter(x=>x),
      note:get("note"),example:get("example"),exampleJa:get("example_ja"),exampleAnswer:get("example_answer")
    });
  }
  return out;
}
function loadCSVText(text){return rowsToItems(parseCSV(text).filter(r=>r.length>1&&r.some(c=>String(c).trim()!=="")));}
function itemsToCSV(items){
  const head=["id","book","section","type","category","question","answer","choice1","choice2","choice3","note","example","example_ja","example_answer"];
  const cell=v=>{v=String(v??"");return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[head.join(",")];
  items.forEach((it,i)=>{
    lines.push([i+1,it.book,it.section,it.type,it.category,it.question,it.answer,
      it.choices[0]||"",it.choices[1]||"",it.choices[2]||"",it.note||"",it.example||"",it.exampleJa||"",it.exampleAnswer||""].map(cell).join(","));
  });
  return lines.join("\n");
}

/* ---------- mastery engine ---------- */
const LEVEL_NAMES=["未学習","学習中","定着中","マスター"];
const LEVEL_COLORS=["#3a3f4a","var(--blue)","var(--gold)","var(--green)"];
// 5-bucket view for the mastery bar (with つまずき)
const BAR_NAMES=["未学習","つまずき","学習中","定着中","マスター"];
const BAR_COLORS=["#3a3f4a","var(--red)","var(--blue)","var(--gold)","var(--green)"];
// status -> badge {cls,label}
function statusBadge(p){
  const s=statusOf(p);
  if(s===0)return {cls:"st-new",label:"未学習"};
  if(s==="review")return {cls:"st-review",label:"つまずき"};
  return {cls:"lvl-"+s,label:LEVEL_NAMES[s]};
}
function wordKey(it){return it.question.toLowerCase().replace(/~/g,"").replace(/\s+/g," ").trim();}
function levelOf(p){const x=p?p.pts:0;return x>=3?3:x>=2?2:x>=1?1:0;}
function getProg(k){return PROG.get(k)||{pts:0,wrong:0,help:0,lastDay:"",seen:0,needsReview:false};}
async function saveProg(k,p){PROG.set(k,p);await DB.put("progress",k,p);}
function dailyRec(){const d=todayStr();DAILY[d]=DAILY[d]||{c:0,w:0,tumbles:[],overcome:[],studied:[]};
  if(!DAILY[d].tumbles)DAILY[d].tumbles=[];if(!DAILY[d].overcome)DAILY[d].overcome=[];
  if(!DAILY[d].studied)DAILY[d].studied=[];return DAILY[d];}
function markStudied(dr,k){if(!dr.studied.includes(k))dr.studied.push(k);}
let overcomeFlash=false;  // 直近の正解で「克服」が起きたか（演出用）
// selfKnow: 2段階方式で「わからない」を申告したか（要復習寄りにする）
async function recordCorrect(it,written,selfUnknown){
  overcomeFlash=false;
  const k=wordKey(it),p=getProg(k);p.seen++;
  if(p.lastDay!==todayStr()){              // 1日1カウントまで（習熟度加点）
    p.pts=Math.min(4,+(p.pts+(written?1.2:1)).toFixed(2));
    p.lastDay=todayStr();
  }
  if(selfUnknown){
    // 「わからない」と申告→正解でも要復習寄り（習熟度は据え置き扱いに戻す）
    p.needsReview=true;
  }else{
    p.needsReview=false;                   // 正解で「要復習」解除
  }
  await saveProg(k,p);
  const dr=dailyRec();dr.c++;markStudied(dr,k);
  // 「わからない」申告時は克服にはカウントしない（理解できていないため）
  if(!selfUnknown&&dr.tumbles.includes(k)&&!dr.overcome.includes(k)){dr.overcome.push(k);overcomeFlash=true;}
  await DB.put("kv","daily",DAILY);
}
async function recordWrong(it){
  const k=wordKey(it),p=getProg(k);p.seen++;p.wrong++;
  p.pts=Math.max(0,levelOf(p)-1);          // 1段階降格
  p.needsReview=true;                      // 「つまずき(要復習)」状態に
  await saveProg(k,p);
  const dr=dailyRec();dr.w++;markStudied(dr,k);
  if(!dr.tumbles.includes(k))dr.tumbles.push(k);
  const oi=dr.overcome.indexOf(k);if(oi>=0)dr.overcome.splice(oi,1);
  await DB.put("kv","daily",DAILY);
}
async function recordHelp(it){              // 据え置き（レベル変化なし・要復習）
  const k=wordKey(it),p=getProg(k);p.seen++;p.help++;p.wrong++;p.needsReview=true;
  await saveProg(k,p);
  const dr=dailyRec();dr.w++;markStudied(dr,k);
  if(!dr.tumbles.includes(k))dr.tumbles.push(k);
  await DB.put("kv","daily",DAILY);
}
async function recordTimeout(it){           // 時間切れ：不正解にせず（降格なし）要復習に
  const k=wordKey(it),p=getProg(k);p.seen++;p.needsReview=true;
  await saveProg(k,p);
  const dr=dailyRec();markStudied(dr,k);
  if(!dr.tumbles.includes(k))dr.tumbles.push(k);
  await DB.put("kv","daily",DAILY);
}
// status: 0=未学習, "review"=つまずき(要復習), 1/2/3=習熟度
function statusOf(p){
  if(!p||p.seen===0)return 0;
  const l=levelOf(p);
  if(l===0&&p.needsReview)return "review";
  return l;
}
function masteryCounts(){
  // [未学習, つまずき, 学習中, 定着中, マスター]
  const c=[0,0,0,0,0];const seen=new Set();
  for(const it of QUESTIONS){const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    const s=statusOf(getProg(k));
    if(s===0)c[0]++;else if(s==="review")c[1]++;else c[s+1]++;}
  return c;
}
function uniqueWordCount(){return new Set(QUESTIONS.map(wordKey)).size;}
function goalItems(){
  const sc=SETTINGS.goalScope||{books:[],cats:[]};
  return QUESTIONS.filter(d=>
    (!sc.books||!sc.books.length||sc.books.includes(d.book))&&
    (!sc.cats||!sc.cats.length||sc.cats.includes(d.category)));
}
function remainingCorrects(){               // master(3pt)までに必要な正解回数の概算（目標範囲内）
  let sum=0;const seen=new Set();
  for(const it of goalItems()){const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    sum+=Math.max(0,Math.ceil(3-getProg(k).pts));}
  return sum;
}
function goalTotalWords(){return new Set(goalItems().map(wordKey)).size;}
function goalMastered(){
  const seen=new Set();let m=0;
  for(const it of goalItems()){const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    if(levelOf(getProg(k))>=3)m++;}
  return m;
}
function paceInfo(){
  if(!SETTINGS.goalDate)return null;
  const goal=new Date(SETTINGS.goalDate+"T23:59:59");
  const days=Math.max(1,Math.ceil((goal-new Date())/86400000));
  const rem=remainingCorrects();
  const sc=SETTINGS.goalScope||{books:[],cats:[]};
  const scoped=(sc.books&&sc.books.length)||(sc.cats&&sc.cats.length);
  return {days,rem,perDay:Math.ceil(rem/days),past:goal<new Date(),
    total:goalTotalWords(),mastered:goalMastered(),scoped};
}
function reviewQueue(items,limit){
  return items
    .map(it=>({it,p:getProg(wordKey(it))}))
    .filter(x=>x.p.needsReview||levelOf(x.p)<3||x.p.wrong>0)
    .sort((a,b)=>{
      const ar=a.p.needsReview?1:0,br=b.p.needsReview?1:0;if(br-ar)return br-ar;
      const l=levelOf(a.p)-levelOf(b.p);if(l)return l;
      const w=b.p.wrong-a.p.wrong;if(w)return w;
      return (a.p.lastDay||"")<(b.p.lastDay||"")?-1:1;
    })
    .slice(0,limit||20).map(x=>x.it);
}
// 「要復習」リスト：間違えた／「わからない」と申告した単語（needsReview=true）
function needsReviewItems(items){
  return (items||QUESTIONS).filter(it=>getProg(wordKey(it)).needsReview);
}
function needsReviewCount(items){return needsReviewItems(items).length;}

/* ---------- speech ---------- */
const synth=window.speechSynthesis;
let enVoice=null;
function pickVoice(){
  if(!synth)return;
  const vs=synth.getVoices().filter(v=>/^en(-|_|$)/i.test(v.lang));
  // 高品質な声を優先（iOSのSiri/Enhanced、各社の高品質音声）
  const score=v=>{
    let s=0;const n=v.name||"";
    if(/siri/i.test(n))s+=6;
    if(/enhanced|premium|neural/i.test(n))s+=5;
    if(/Samantha|Ava|Allison|Serena|Daniel|Karen|Moira/i.test(n))s+=3;
    if(/Google US English/i.test(n))s+=2;
    if(/en-US/i.test(v.lang))s+=1;
    if(v.localService)s+=1;          // 端末内＝オフラインで安定
    return s;
  };
  enVoice=vs.slice().sort((a,b)=>score(b)-score(a))[0]||null;
}

function speak(text,btn){
  if(!synth)return;
  synth.cancel();
  const clean=String(text).replace(/_{2,}/g," blank ").replace(/~/g," ").replace(/\s+/g," ").trim();
  const u=new SpeechSynthesisUtterance(clean);
  if(enVoice)u.voice=enVoice;
  u.lang=(enVoice&&enVoice.lang)||"en-US";u.rate=SETTINGS.speechRate||0.92;
  if(btn){btn.classList.add("playing");u.onend=u.onerror=()=>btn.classList.remove("playing");}

/* ---------- quiz helpers ---------- */
const TYPE_LABEL={word:"単語",idiom:"熟語",grammar:"文法",order:"並べ替え"};
function canEnglishAnswer(it){
  if(it.type==="order"||it.type==="grammar")return false;
  const q=it.question.trim();
  if(/_/.test(q))return false;
  return q.replace(/~/g,"").trim().split(/\s+/).filter(Boolean).length<=4;
}
function hasExample(it){return !!(it.example&&/_{2,}/.test(it.example));}
function clozeAnswer(it){return (it.exampleAnswer&&it.exampleAnswer.trim())?it.exampleAnswer.trim():it.question.replace(/~/g,"").trim();}
function clozeHTML(it){return esc(it.example).replace(/_{2,}/,'<span class="cloze-gap">____</span>');}
function levenshtein(a,b){
  a=a.toLowerCase();b=b.toLowerCase();
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];
}
function normSpell(s){return String(s).trim().toLowerCase().replace(/~/g," ").replace(/\s+/g," ").trim();}
function buildChoices(it){                  // 英→日: 同category優先で意味の4択
  if(it.choices.length>=3)return shuffle([it.answer,...it.choices.slice(0,3)]);
  const distract=[],seen=new Set([it.answer]);
  const tiers=[
    QUESTIONS.filter(d=>d.category===it.category&&d.type===it.type),
    QUESTIONS.filter(d=>d.type===it.type),QUESTIONS];
  for(const tier of tiers){
    for(const d of shuffle(tier)){if(distract.length>=3)break;
      if(!seen.has(d.answer)){distract.push(d.answer);seen.add(d.answer);}}
    if(distract.length>=3)break;
  }
  return shuffle([it.answer,...distract]);
}
function buildChoicesReverse(it){           // 日→英: 英語の4択
  const distract=[],seen=new Set([it.question]);
  const tiers=[
    QUESTIONS.filter(d=>d.category===it.category&&d.type===it.type&&canEnglishAnswer(d)),
    QUESTIONS.filter(d=>d.type===it.type&&canEnglishAnswer(d)),
    QUESTIONS.filter(d=>canEnglishAnswer(d))];
  for(const tier of tiers){
    for(const d of shuffle(tier)){if(distract.length>=3)break;
      if(!seen.has(d.question)){distract.push(d.question);seen.add(d.question);}}
    if(distract.length>=3)break;
  }
  return shuffle([it.question,...distract]);
}
function buildChoicesCloze(it,correct){     // 穴埋め4択
  const distract=[],seen=new Set([correct.toLowerCase()]);
  const tiers=[
    QUESTIONS.filter(d=>d.category===it.category&&d!==it),
    QUESTIONS.filter(d=>d.type===it.type&&d!==it),
    QUESTIONS.filter(d=>d!==it)];
  for(const tier of tiers){
    for(const d of shuffle(tier)){if(distract.length>=3)break;
      const w=(d.exampleAnswer&&hasExample(d))?d.exampleAnswer.trim():d.question.replace(/~/g,"").trim();
      if(w&&!seen.has(w.toLowerCase())){distract.push(w);seen.add(w.toLowerCase());}}
    if(distract.length>=3)break;
  }
  return shuffle([correct,...distract]);
}
// 形式の自動フォールバック
function effectiveMode(it,chosen){
  let m=chosen;
  if(it.type==="order")return "order";
  if((m==="cloze_mc"||m==="cloze_type")&&!hasExample(it))
    m=canEnglishAnswer(it)?(m==="cloze_type"?"spell":"ja2en"):"en2ja";
  if((m==="ja2en"||m==="spell")&&!canEnglishAnswer(it))m="en2ja";
  return m;
}

// start a countdown bar; calls onExpire() when time runs out
function startTimer(onExpire){
  stopTimer();
  if(!SETTINGS.timed)return;
  const fill=$("#timerFill");if(!fill)return;
  const total=(SETTINGS.timeSec||8)*1000;
  let start=Date.now();
  fill.style.width="100%";fill.className="";
  _timer=setInterval(()=>{
    const elapsed=Date.now()-start;
    const left=Math.max(0,total-elapsed);
    const pct=left/total*100;
    fill.style.width=pct+"%";
    fill.className=pct<25?"danger":pct<50?"warn":"";
    if(left<=0){stopTimer();onExpire&&onExpire();}
  },100);
}

function paintMC(correct,picked){
  document.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true;const v=decodeURIComponent(b.dataset.v);
    if(v===correct)b.classList.add("correct");

}
async function chooseMC(btn,item,correct,mode,selfUnknown){
  const s=session;if(s.answered)return;s.answered=true;
  const picked=decodeURIComponent(btn.dataset.v);
  const ok=picked===correct;
  paintMC(correct,btn);
  if(mode==="ja2en")speak(item.question,null);
  if(mode==="cloze_mc")speak(item.example.replace(/_{2,}/,clozeAnswer(item)),null);
  if(ok)await recordCorrect(item,false,selfUnknown);else await recordWrong(item);
  let msg=ok?"CORRECT":"正解 → "+correct;
  if(ok&&selfUnknown)msg="正解（要復習に追加）";  // わからない申告→正解でも復習対象
  finishAnswer(ok,item,msg,false,selfUnknown);  // selfUnknown正解は再チャレンジ対象
}
async function checkTyped(inp,item,mode){
  const s=session;if(s.answered)return;s.answered=true;
  const target=mode==="cloze_type"?clozeAnswer(item):item.question;
  const ans=normSpell(target),got=normSpell(inp.value);
  const ok=got===ans;
  inp.disabled=true;inp.classList.add(ok?"correct":"wrong");
  const b=$("#spellBtn");if(b)b.style.display="none";
  const h=$("#helpBtn");if(h)h.style.display="none";
  if(mode==="cloze_type")speak(item.example.replace(/_{2,}/,clozeAnswer(item)),null);
  else speak(item.question,null);
  let msg;
  if(ok)msg="CORRECT";
  else{const near=levenshtein(got,ans)<=1&&got.length>0;msg=(near?"惜しい！ ":"")+"正解 → "+target;}
  if(ok)await recordCorrect(item,true);else await recordWrong(item);
  finishAnswer(ok,item,msg,false);
}

function setupOrder(item){
  const tokens=item.answer.split(/\s+/);
  const chips=shuffle(tokens.map((t,i)=>({t,i})));
  let placed=[];
  const ans=$("#ans"),bank=$("#bank"),check=$("#check");
  function paint(){
    bank.innerHTML=chips.map(c=>`<span class="chip ${placed.includes(c.i)?'used':''}" data-i="${c.i}">${esc(c.t)}</span>`).join("");
    ans.innerHTML=placed.map(i=>`<span class="chip in-answer" data-i="${i}">${esc(tokens[i])}</span>`).join("");
    check.disabled=placed.length!==tokens.length;
    bank.querySelectorAll(".chip:not(.used)").forEach(el=>el.onclick=()=>{placed.push(+el.dataset.i);paint();});
    ans.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{placed=placed.filter(x=>x!==+el.dataset.i);paint();});
  }
  paint();
  check.onclick=async()=>{
    const s=session;if(s.answered)return;s.answered=true;
    const built=placed.map(i=>tokens[i]).join(" ");
    const ok=built.toLowerCase()===item.answer.toLowerCase();
    check.style.display="none";
    ans.style.borderColor=ok?"var(--green)":"var(--red)";
    document.querySelectorAll(".chip").forEach(c=>c.style.pointerEvents="none");
    speak(item.answer,null);
    if(ok)await recordCorrect(item,false);else await recordWrong(item);
    finishAnswer(ok,item,ok?"CORRECT":"正解 → "+item.answer,false);
  };
}
function finishAnswer(ok,item,msg,helpUsed,forceReview){
  const s=session;

  if(ok&&overcomeFlash){msg="克服しました 🎉 "+msg;overcomeFlash=false;}

  // 「わからない」申告やヒント正解は、正解でもセッションの再チャレンジ対象に含める

  n.textContent=(s.idx+1>=s.total)?"結果を見る →":"NEXT →";

  else if(pct>=50){msg="GOOD";sub="あと一歩。間違えた問題を復習しましょう。";}
  else{msg="KEEP GOING";sub="繰り返しが定着への近道です。";}
  const retryNote=retryN>wrongN
    ? `◆ 間違い＋「わからない」の ${retryN} 問を再チャレンジできます`
    : `◆ 間違えた ${retryN} 問だけ再チャレンジできます`;
  screen.innerHTML=`
    <div class="result">
      <div class="lt-eyebrow">Result · ${esc(s.label)}</div>
      <div class="ring">

          <circle cx="75" cy="75" r="64" stroke="var(--panel-2)" stroke-width="9" fill="none"/>
          <circle cx="75" cy="75" r="64" stroke="${col}" stroke-width="9" fill="none"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}" id="arc"/>
        </svg>
        <div class="pct"><b>${pct}<span style="font-size:18px">%</span></b><small>SCORE</small></div>
      </div>
      <div class="res-msg">${msg}</div>
      <div class="res-sub">${sub}</div>
      <div class="stat-row">
        <div class="s"><div class="n">${s.total}</div><div class="l">Total</div></div>
        <div class="s"><div class="n" style="color:var(--green)">${s.score}</div><div class="l">Correct</div></div>
        <div class="s"><div class="n" style="color:var(--red)">${wrongN}</div><div class="l">Wrong</div></div>
      </div>
      ${retryN>0?`<div class="retry-note">${retryNote}</div>
        <button class="btn danger" id="retry">${retryN}問を再チャレンジ</button>`:""}
      <button class="btn primary" id="menu" style="margin-top:10px">メニューに戻る</button>
    </div>`;
  requestAnimationFrame(()=>{const a=$("#arc");a.style.transition="stroke-dashoffset 1s cubic-bezier(.2,.8,.3,1)";a.style.strokeDashoffset=off;});
  if(retryN>0)$("#retry").onclick=()=>startQuiz(shuffle(s.wrong),s.label+" · 復習",s.chosenMode);
  $("#menu").onclick=quitQuiz;
}

function sectionsOf(b){return uniq(QUESTIONS.filter(d=>d.book===b).map(d=>d.section));}
function categoriesOf(b,s){return uniq(QUESTIONS.filter(d=>d.book===b&&d.section===s).map(d=>d.category));}
function itemsOf(b,s,c){return QUESTIONS.filter(d=>(b==null||d.book===b)&&(s==null||d.section===s)&&(c==null||d.category===c));}

function sectionMastery(book,sec){
  const counts=[0,0,0,0,0];const seen=new Set();
  for(const it of itemsOf(book,sec,null)){
    const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    const st=statusOf(getProg(k));
    if(st===0)counts[0]++;else if(st==="review")counts[1]++;else counts[st+1]++;
  }
  const tot=counts.reduce((a,b)=>a+b,0);
  return {counts,tot,pct:tot?Math.round(counts[4]/tot*100):0};
}

function statusKeyOf(it){
  const s=statusOf(getProg(wordKey(it)));
  return s===0?"new":s==="review"?"review":("l"+s);  // new,review,l1,l2,l3
}
function renderRange(book,sec){
  const cats=categoriesOf(book,sec);
  const total=itemsOf(book,sec,null).length;
  let selected=new Set();          // 選択中の品詞（空＝全体）
  let statusFilter="all";          // all/new/review/l1/l2/l3
  let limit=0;                     // 0=全部
  const countItems=()=>{
    let base=selected.size===0?itemsOf(book,sec,null):itemsOf(book,sec,null).filter(d=>selected.has(d.category));
    if(statusFilter!=="all")base=base.filter(d=>statusKeyOf(d)===statusFilter);
    return base;
  };
  const statusOpts=[["all","すべて"],["new","未学習"],["l1","学習中"],["review","つまずき"],["l2","定着中"],["l3","マスター"]];
  screen.innerHTML=`
    <div class="navbar"><button class="back" id="bk">← セクション</button><div class="nav-title"><b>${esc(sec)}</b></div></div>
    <div class="lt" style="font-size:22px">出題範囲を選ぶ</div>
    <div class="lt-sub">${esc(book)} · 品詞は複数選べます（未選択で全体）</div>
    <div class="grid2" id="catGrid">
      ${cats.map(cat=>{
        const n=itemsOf(book,sec,cat).length;
        return `<div class="set-card" data-cat="${encodeURIComponent(cat)}">
          <div class="chk">✓</div>
          <h4>${esc(cat)}</h4><div class="cnt">${n} 問</div>
          <div class="cat">${TYPE_LABEL[itemsOf(book,sec,cat)[0].type]||""}</div></div>`;}).join("")}
    </div>
    <div class="divider"><span>習熟度でしぼる</span></div>
    <div class="chips" id="statusChips">
      ${statusOpts.map(([k,lbl])=>`<button class="filter-chip ${k==='all'?'on':''}" data-st="${k}">${lbl}</button>`).join("")}
    </div>
    <div class="divider"><span>出題数</span></div>
    <div class="count-chips" id="countChips">
      <div class="count-chip on" data-lim="0">全部</div>
      <div class="count-chip" data-lim="20">20問</div>
      <div class="count-chip" data-lim="10">10問</div>
    </div>
    <button class="btn primary" id="start" style="margin-top:20px">この範囲で学習（<span id="cnt">${total}</span>問）</button>`;
  $("#bk").onclick=()=>renderSections(book);
  const refresh=()=>{
    const base=countItems();
    const n=limit>0?Math.min(limit,base.length):base.length;
    $("#cnt").textContent=n;
  };
  document.querySelectorAll(".set-card[data-cat]").forEach(c=>c.onclick=()=>{
    const cat=decodeURIComponent(c.dataset.cat);
    if(selected.has(cat)){selected.delete(cat);c.classList.remove("sel");}
    else{selected.add(cat);c.classList.add("sel");}
    refresh();
  });
  document.querySelectorAll("[data-st]").forEach(ch=>ch.onclick=()=>{
    statusFilter=ch.dataset.st;
    document.querySelectorAll("[data-st]").forEach(x=>x.classList.toggle("on",x===ch));
    refresh();
  });
  document.querySelectorAll(".count-chip").forEach(ch=>ch.onclick=()=>{
    limit=+ch.dataset.lim;
    document.querySelectorAll(".count-chip").forEach(x=>x.classList.toggle("on",x===ch));
    refresh();
  });
  $("#start").onclick=()=>{
    let base=shuffle(countItems());
    if(limit>0)base=base.slice(0,limit);
    if(!base.length){toast("対象がありません");return;}
    const stLabel=statusFilter==="all"?"":" · "+(statusOpts.find(o=>o[0]===statusFilter)[1]);
    const label=(selected.size===0?`${sec}（全体）`:`${sec} · ${[...selected].join("・")}`)+stLabel;
    renderFormSelect(base,label,()=>renderRange(book,sec));
  };
}

    (!secs.length||secs.includes(d.book+"\u241f"+d.section))&&

/* ---- flashcard (単語帳) — テストとは独立。FLASH に覚えた/まだ を別管理 ---- */
function flashMark(it){return FLASH[wordKey(it)]||null;}
async function setFlashMark(it,mark){
  const k=wordKey(it);
  if(mark)FLASH[k]=mark;else delete FLASH[k];
  await DB.put("kv","flash",FLASH);
}
function flashStats(items){
  let known=0,later=0,untouched=0;
  const seen=new Set();
  for(const it of items){const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    const m=FLASH[k];if(m==="known")known++;else if(m==="later")later++;else untouched++;}
  return {known,later,untouched,total:seen.size};
}

let flashSession=null;
function startFlash(cards,label,dir,backFn){
  // showEn/showJa: それぞれの面の表示状態。英→日では最初は日本語(意味)を隠す。
  flashSession={cards,label,dir,backFn,idx:0,
    showEn:true,showJa:(dir!=="en2ja")?false:false};
  // 既定：英語面は表示、意味面は隠す（思い出してから下をタップ）
  flashSession.showEn=true;flashSession.showJa=false;
  renderFlashCard();
}
function renderFlashCard(){
  const fs=flashSession,it=fs.cards[fs.idx];
  // 上半分＝英語、下半分＝日本語（向きに関わらず位置は固定。英語が上・意味が下）
  const enText=esc(it.question), jaText=esc(it.answer);
  const mark=flashMark(it);
  const exHTML=it.example?`<div class="fc-ex">${esc(it.example.replace(/_{2,}/,clozeAnswer(it)))}${it.exampleJa?"<br>"+esc(it.exampleJa):""}</div>`:"";
  screen.innerHTML=`
    <div class="navbar"><button class="back" id="bk">終了</button>
      <div class="nav-title"><b>${esc(fs.label)}</b> · 単語帳</div></div>
    <div class="flash-meta"><span>${String(fs.idx+1).padStart(2,'0')} / ${String(fs.cards.length).padStart(2,'0')}</span>
      <span>覚えた ${flashStats(fs.cards).known} / ${fs.cards.length}</span></div>
    <div class="track"><div style="width:${fs.idx/fs.cards.length*100}%"></div></div>
    <div style="height:14px"></div>
    <div class="flash-card">
      <button class="flash-speak" id="fspeak" aria-label="発音"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg></button>
      ${mark?`<div class="fc-mark ${mark}">${mark==="known"?"覚えた":"まだ"}</div>`:""}
      <div class="fc-half fc-top" id="topHalf">
        ${fs.showEn?`<div class="fc-en">${enText}</div>`:`<div class="fc-tap">英語を表示（タップ）</div>`}
      </div>
      <div class="fc-line"></div>
      <div class="fc-half fc-bottom" id="botHalf">
        ${fs.showJa?`<div class="fc-ja">${jaText}</div>${exHTML}`:`<div class="fc-tap">意味を表示（タップ）</div>`}
      </div>
    </div>
    <div class="flash-actions">
      <button class="fc-later" id="later">まだ</button>
      <button class="fc-known" id="known">覚えた</button>
    </div>`;
  window.scrollTo(0,0);
  $("#bk").onclick=()=>{flashSession=null;(fs.backFn||renderFlashBooks)();};
  $("#fspeak").onclick=e=>{e.stopPropagation();speak(it.question,$("#fspeak"));};
  $("#topHalf").onclick=()=>{fs.showEn=!fs.showEn;renderFlashCard();};
  $("#botHalf").onclick=()=>{fs.showJa=!fs.showJa;renderFlashCard();};
  const next=async(mark)=>{
    await setFlashMark(it,mark);
    if(fs.idx+1>=fs.cards.length){renderFlashDone();}
    else{fs.idx++;fs.showEn=true;fs.showJa=false;renderFlashCard();}
  };
  $("#later").onclick=()=>next("later");
  $("#known").onclick=()=>next("known");
}
function renderFlashDone(){
  const fs=flashSession;

  screen.innerHTML=`

}

/* ---------- PROGRESS ---------- */
function renderProgress(){
  const c=masteryCounts(),total=uniqueWordCount();
  // seen words only
  const seen=new Set();
  const words=[];
  for(const it of QUESTIONS){
    const k=wordKey(it);if(seen.has(k))continue;seen.add(k);
    const p=getProg(k);
    if(p.seen>0)words.push({it,p,lvl:levelOf(p),st:statusOf(p)});
  }
  // weak words: つまずき優先 → ミス多い → 習熟度低い
  const weak=words.filter(w=>w.st==="review"||w.p.wrong>0||w.lvl<3)
    .sort((a,b)=>{
      const ar=a.st==="review"?1:0,br=b.st==="review"?1:0;if(br-ar)return br-ar;
      if(b.p.wrong-a.p.wrong)return b.p.wrong-a.p.wrong;
      return a.lvl-b.lvl;
    }).slice(0,10);
  // weak sections — 回答済みの語だけで集計（未学習だけの節は除外）
  const seenKeys=new Set(words.map(w=>wordKey(w.it)));
  const secMap={};
  for(const it of QUESTIONS){
    if(!seenKeys.has(wordKey(it)))continue;
    const key=it.book+" › "+it.section;
    const p=getProg(wordKey(it));
    const m=(secMap[key]=secMap[key]||{lvl:0,n:0,wrong:0});
    m.lvl+=levelOf(p);m.n++;m.wrong+=p.wrong;
  }
  const weakSecs=Object.entries(secMap)
    .map(([k,v])=>({k,avg:v.lvl/v.n,wrong:v.wrong,n:v.n}))
    .filter(s=>s.avg<3||s.wrong>0)
    .sort((a,b)=>a.avg-b.avg||b.wrong-a.wrong).slice(0,5);
  const totalSeen=words.reduce((a,w)=>a+w.p.seen,0);
  const totalWrong=words.reduce((a,w)=>a+w.p.wrong,0);
  const studiedDays=Object.keys(DAILY).length;

  // per-section mastery breakdown (全セクション・ビジュアル) — unique words per section
  const secBreak={};
  for(const it of QUESTIONS){
    const key=it.book+" › "+it.section;
    const m=(secBreak[key]=secBreak[key]||{counts:[0,0,0,0,0],keys:new Set()});
    const k=wordKey(it);if(m.keys.has(k))continue;m.keys.add(k);
    const st=statusOf(getProg(k));
    if(st===0)m.counts[0]++;else if(st==="review")m.counts[1]++;else m.counts[st+1]++;
  }
  const secList=Object.entries(secBreak).map(([k,v])=>{
    const tot=v.counts.reduce((a,b)=>a+b,0);
    const masteredPct=tot?Math.round(v.counts[4]/tot*100):0;
    return {k,counts:v.counts,tot,masteredPct};
  }).sort((a,b)=>a.masteredPct-b.masteredPct);

  screen.innerHTML=`
    <div class="lt-eyebrow">Progress</div>
    <div class="lt">進捗</div>
    <div class="lt-sub">単語ごとの習熟度と、実際につまずいた弱点を確認できます。</div>
    <div class="stat-row">
      <div class="s"><div class="n">${totalSeen}</div><div class="l">総回答</div></div>
      <div class="s"><div class="n" style="color:var(--red)">${needsReviewCount()}</div><div class="l">要復習</div></div>
      <div class="s"><div class="n" style="color:var(--gold)">${studiedDays}</div><div class="l">学習日数</div></div>
    </div>
    <div class="card">
      <div class="ic">Mastery · ${total}語</div>
      <div class="mbar">${c.map((n,i)=>`<div style="flex:${Math.max(n,0.001)};background:${BAR_COLORS[i]}"></div>`).join("")}</div>
      <div class="mlegend">${c.map((n,i)=>`<span><span class="dot" style="background:${BAR_COLORS[i]}"></span>${BAR_NAMES[i]} ${n}</span>`).join("")}</div>
    </div>
    <div class="divider"><span>苦手な単語</span></div>
    ${weak.length?`<div class="list">${weak.map(w=>{const bd=statusBadge(w.p);return `
      <div class="row" style="cursor:default">
        <div class="row-main"><div class="row-title">${esc(w.it.question)}</div>
        <div class="row-sub">${esc(w.it.answer)} · ミス${w.p.wrong}回${w.p.help?` · ヒント${w.p.help}回`:""}</div></div>
        <span class="lvl-badge ${bd.cls}">${bd.label}</span>
      </div>`;}).join("")}</div>`
    :`<div class="empty">${totalSeen?"苦手な単語はありません。順調です。":"まだ学習記録がありません。<br>学習を始めるとここに弱点が表示されます。"}</div>`}
    <div class="divider"><span>セクション別の進捗</span></div>
    <div class="list">
      ${secList.map(s=>`
        <div class="card" style="margin-bottom:10px;padding:14px 15px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
            <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.k)}</div>
            <div style="font-family:'Archivo';font-size:13px;font-weight:800;color:${s.masteredPct>=80?'var(--green)':s.masteredPct>=40?'var(--gold)':'var(--sub)'};flex:none;margin-left:10px">${s.masteredPct}%</div>
          </div>
          <div class="mbar" style="margin:0">${s.counts.map((n,i)=>`<div style="flex:${Math.max(n,0.001)};background:${BAR_COLORS[i]}"></div>`).join("")}</div>
        </div>`).join("")}
    </div>
    <div class="divider"><span>苦手なセクション</span></div>
    ${weakSecs.length?`<div class="list">${weakSecs.map(s=>`
      <div class="row" style="cursor:default">
        <div class="row-main"><div class="row-title" style="font-size:13.5px">${esc(s.k)}</div>
        <div class="row-sub">平均習熟度 ${s.avg.toFixed(1)} · ミス${s.wrong}回 · 学習済み${s.n}問</div></div>
      </div>`).join("")}</div>`
    :`<div class="empty">${totalSeen?"苦手なセクションはありません。":"学習するとセクション別の分析が表示されます。"}</div>`}`;
}

  const isNew=idx<0;
  const it=isNew?{book:booksList()[0]||"未分類",section:"その他",type:"word",category:"その他",
    question:"",answer:"",choices:[],note:"",example:"",exampleJa:"",exampleAnswer:""}:QUESTIONS[idx];
  const F=(label,id,val,ph)=>`<div class="field"><label>${label}</label>
    <input id="${id}" value="${esc(val)}" placeholder="${ph||""}" autocapitalize="off" autocorrect="off"></div>`;
  screen.innerHTML=`
    <div class="navbar"><button class="back" id="bk">← 一覧</button>
      <div class="nav-title"><b>${isNew?"新規追加":"編集"}</b></div></div>
    ${F("英語（question）","fq",it.question)}
    ${F("意味（answer）","fa",it.answer)}
    <div class="field"><label>形式（type）</label>
      <select id="ft">${["word","idiom","grammar","order"].map(t=>`<option value="${t}" ${it.type===t?"selected":""}>${t} — ${TYPE_LABEL[t]}</option>`).join("")}</select></div>
    ${F("教材（book）","fb",it.book)}
    ${F("セクション（section）","fs",it.section)}
    ${F("品詞・分類（category）","fc",it.category)}
    ${F("選択肢1（任意）","fc1",it.choices[0]||"")}
    ${F("選択肢2（任意）","fc2",it.choices[1]||"")}
    ${F("選択肢3（任意）","fc3",it.choices[2]||"")}
    ${F("解説（note・任意）","fn",it.note)}
    ${F("例文（example・空所は ____）","fe",it.example,"He ____ his fear.")}
    ${F("例文の訳（example_ja）","fej",it.exampleJa)}
    ${F("空所の答え（example_answer・活用形）","fea",it.exampleAnswer,"overcame")}
    <button class="btn primary" id="save">保存する</button>
    ${isNew?"":`<button class="btn danger" id="del">この問題を削除</button>`}`;
  $("#bk").onclick=()=>renderEditorList(backQuery);
  $("#save").onclick=async()=>{
    const v=id=>$(id).value.trim();
    if(!v("#fq")||!v("#fa")){toast("英語と意味は必須です");return;}
    const next={book:v("#fb")||"未分類",section:v("#fs")||"その他",
      type:$("#ft").value,category:v("#fc")||"その他",
      question:v("#fq"),answer:v("#fa"),
      choices:[v("#fc1"),v("#fc2"),v("#fc3")].filter(x=>x),
      note:v("#fn"),example:v("#fe"),exampleJa:v("#fej"),exampleAnswer:v("#fea")};
    if(isNew){
      // add to the book matching the chosen book name, else first book
      let b=LIBRARY.find(x=>x.name===next.book)||LIBRARY.find(x=>x.items.some(i=>i.book===next.book))||LIBRARY[0];
      if(!b){b={name:next.book,items:[]};LIBRARY.push(b);}
      b.items.push(next);
    }else{
      const target=QUESTIONS[idx];
      for(const b of LIBRARY){const j=b.items.indexOf(target);if(j>=0){b.items[j]=next;break;}}
    }
    await syncLibrary();
    toast(isNew?"追加しました":"保存しました");
    renderEditorList(backQuery);
  };
  const del=$("#del");
  if(del)del.onclick=async()=>{
    if(!confirm("この問題を削除しますか？"))return;
    const target=QUESTIONS[idx];
    for(const b of LIBRARY){const j=b.items.indexOf(target);if(j>=0){b.items.splice(j,1);break;}}
    await syncLibrary();
    toast("削除しました");renderEditorList(backQuery);
  };
}

/* ---------- file import (CSV / xlsx) ---------- */
$("#fileInput").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;
  const isXlsx=/\.(xlsx|xls)$/i.test(f.name);
  const r=new FileReader();
  r.onload=async()=>{
    try{
      let items;
      if(isXlsx){
        if(typeof XLSX==="undefined"){toast("Excel読込には初回のみ通信が必要です");return;}
        const wb=XLSX.read(r.result,{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
        items=rowsToItems(rows.filter(rw=>rw.some(c=>String(c).trim()!=="")));
      }else{
        items=loadCSVText(r.result);
      }
      if(!items.length){toast("有効な問題が見つかりません。列名をご確認ください");return;}
      const bookName=f.name.replace(/\.(csv|xlsx|xls)$/i,"").trim()||"教材"+(LIBRARY.length+1);
      await addBookToLibrary(bookName,items);
      toast(`「${bookName}」を ${items.length} 問 追加しました`);
      switchTab(currentTab);
    }catch(err){console.error(err);toast("読み込みエラー：ファイル形式をご確認ください");}
  };
  if(isXlsx)r.readAsArrayBuffer(f);else r.readAsText(f,"utf-8");
  e.target.value="";
});

/* ---------- restore learning records from backup JSON ---------- */
$("#restoreInput").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const data=JSON.parse(r.result);
      if(data._format!=="vocab-backup"||!data.progress){
        toast("このファイルは学習記録のバックアップではありません");return;}
      if(!confirm("現在の学習記録をこのバックアップで置き換えます。よろしいですか？"))return;
      // restore settings & daily
      if(data.settings)SETTINGS={...SETTINGS,...data.settings};
      DAILY=data.daily||{};
      if(data.mylists)MYLISTS=data.mylists;
      if(data.flash)FLASH=data.flash;
      if(data.mywords){MYWORDS=data.mywords;await DB.put("kv","mywords",MYWORDS);rebuildQuestions();}
      await DB.put("kv","settings",SETTINGS);
      await DB.put("kv","daily",DAILY);
      await DB.put("kv","mylists",MYLISTS);
      await DB.put("kv","flash",FLASH);
      // restore progress
      await DB.clear("progress");
      PROG=new Map();
      for(const [k,v] of Object.entries(data.progress)){PROG.set(k,v);await DB.put("progress",k,v);}
      toast(`学習記録を復元しました（${PROG.size}語）`);
      switchTab("settings");
    }catch(err){console.error(err);toast("復元エラー：ファイルが壊れている可能性があります");}
  };
  r.readAsText(f,"utf-8");
  e.target.value="";
});

/* ---------- init ---------- */
(async function init(){
  try{
    await DB.open();
    let lib=await DB.get("kv","library");
    if(!lib||!lib.length){
      // migrate from older single-questions storage, else seed default
      const old=await DB.get("kv","questions");
      const items=(old&&old.length)?old:loadCSVText(DEFAULT_CSV);
      lib=[{name:"サンプル教材",items}];
      await DB.put("kv","library",lib);
    }
    LIBRARY=lib;
    const mw=await DB.get("kv","mywords");if(mw)MYWORDS=mw;
    const st=await DB.get("kv","settings");if(st)SETTINGS={...SETTINGS,...st};
    if(!SETTINGS.goalScope||typeof SETTINGS.goalScope!=="object")SETTINGS.goalScope={books:[],cats:[]};
    if(!SETTINGS.goalScope.books)SETTINGS.goalScope.books=[];
    if(!SETTINGS.goalScope.cats)SETTINGS.goalScope.cats=[];
    if(typeof SETTINGS.speechRate!=="number")SETTINGS.speechRate=0.92;
    const dl=await DB.get("kv","daily");if(dl)DAILY=dl;
    const ml=await DB.get("kv","mylists");if(ml)MYLISTS=ml;
    const fl=await DB.get("kv","flash");if(fl)FLASH=fl;
    PROG=new Map(await DB.entries("progress"));
    rebuildQuestions();
  }catch(err){
    console.error("DB init failed",err);
    LIBRARY=[{name:"サンプル教材",items:loadCSVText(DEFAULT_CSV)}];
    rebuildQuestions();
  }
  renderHome();
})();

/* ---------- service worker ---------- */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
